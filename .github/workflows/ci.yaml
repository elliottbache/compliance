name: CI

on:
  push:
    paths:
      - "backend/src/**"
      - "backend/tests/**"
      - "frontend/src/**"
      - "frontend/tests/**"
      - "docs/**"
      - ".github/workflows/**"
      - "pyproject.toml"
      - "frontend/package.json"
      - "frontend/package-lock.json"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (project + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run pre-commit (all files)
        run: pre-commit run --all-files

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend/src
        run: |
          pytest -q --cov --cov-branch --cov-report=xml --cov-fail-under=85

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install pytest pytest-cov

      - name: Run Docs
        run: |
          rm -rf docs/_build docs/_autosummary
          sphinx-build -b html docs docs/_build/html

  migration-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: compliance_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d compliance_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: development
      POSTGRES_DB: compliance_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      SECRET_KEY: ci-only-secret-key-not-for-production

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Alembic migrations
        run: |
          alembic -c backend/alembic.ini upgrade head

      - name: Check migration drift
        run: |
          alembic -c backend/alembic.ini check